name: Validate

on:
  push:
    branches: [main, preview, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index.html exists and is valid
        run: |
          test -f index.html || (echo "index.html missing" && exit 1)
          grep -q "Dream Board Mobile" index.html || (echo "Title missing" && exit 1)
          grep -q "ReactDOM.createRoot" index.html || (echo "React missing" && exit 1)
          echo "All checks passed - $(wc -l < index.html) lines"
